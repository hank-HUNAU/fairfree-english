<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>采矿专业英语 - Mining English</title>
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #f5f5f7;
  --card-bg: #ffffff;
  --text: #1d1d1f;
  --text-secondary: #86868b;
  --accent: #0071e3;
  --accent-hover: #0077ed;
  --green: #34c759;
  --green-bg: rgba(52, 199, 89, 0.1);
  --blue: #0071e3;
  --blue-bg: rgba(0, 113, 227, 0.1);
  --orange: #ff9500;
  --orange-bg: rgba(255, 149, 0, 0.1);
  --gray: #86868b;
  --gray-bg: rgba(134, 134, 139, 0.1);
  --radius: 16px;
  --radius-btn: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'Noto Sans SC', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== Hero ===== */
.hero {
  max-width: 1120px;
  margin: 0 auto;
  padding: 80px 24px 48px;
  text-align: center;
}

.hero-title {
  font-size: clamp(36px, 6vw, 56px);
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 8px;
}

.hero-subtitle {
  font-size: clamp(16px, 2.5vw, 21px);
  font-weight: 400;
  color: var(--text-secondary);
  margin-bottom: 16px;
  letter-spacing: 0.01em;
}

.hero-desc {
  font-size: 17px;
  color: var(--text-secondary);
  max-width: 520px;
  margin: 0 auto 32px;
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.hero-stats .stat {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: var(--card-bg);
  border-radius: 100px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  box-shadow: var(--shadow);
}

.hero-stats .stat strong {
  color: var(--text);
  font-weight: 600;
}

.hero-stats .stat .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  display: inline-block;
}

.dot-blue { background: var(--blue); }
.dot-green { background: var(--green); }
.dot-orange { background: var(--orange); }

/* ===== Grid ===== */
.grid-section {
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

@media (max-width: 1024px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 560px) {
  .grid { grid-template-columns: 1fr; }
  .hero { padding: 56px 20px 32px; }
  .grid-section { padding: 0 20px 56px; }
}

/* ===== Card ===== */
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  cursor: default;
  transition: transform 0.22s ease, box-shadow 0.22s ease;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.card-number {
  font-size: 32px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 12px;
  opacity: 0.35;
}

.card-title-en {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.35;
}

.card-title-cn {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 16px;
  line-height: 1.35;
}

.card-footer {
  margin-top: auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.card-module {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 100px;
}

.module-geo { background: var(--blue-bg); color: var(--blue); }
.module-underground { background: var(--green-bg); color: #248a3d; }
.module-surface { background: var(--orange-bg); color: #c77600; }

.card-status {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 100px;
}

.status-done { background: var(--green-bg); color: var(--green); }
.status-pending { background: var(--gray-bg); color: var(--gray); }

/* ===== Card Learning Buttons ===== */
.card-links {
  margin-top: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.card-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
  background: var(--blue-bg);
  cursor: pointer;
  transition: all 0.2s ease;
  text-decoration: none;
  line-height: 1.2;
}

.card-link:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  transform: translateY(-1px);
}

.card-link:active {
  transform: scale(0.97);
}

.card-link .link-icon {
  font-size: 14px;
  line-height: 1;
  flex-shrink: 0;
}

.card-link.disabled {
  color: var(--gray);
  background: var(--gray-bg);
  border-color: transparent;
  cursor: default;
  pointer-events: none;
}

/* ===== Modal ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s ease, visibility 0.3s ease;
}

.modal-overlay.open {
  opacity: 1;
  visibility: visible;
}

.modal-container {
  position: fixed;
  inset: 0;
  z-index: 1001;
  background: var(--card-bg);
  display: flex;
  flex-direction: column;
  transform: translateY(20px);
  opacity: 0;
  visibility: hidden;
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.3s ease, visibility 0.3s ease;
}

.modal-container.open {
  transform: translateY(0);
  opacity: 1;
  visibility: visible;
}

.modal-toolbar {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  background: var(--card-bg);
  border-bottom: 1px solid rgba(0,0,0,0.06);
  flex-shrink: 0;
  gap: 12px;
}

.modal-back {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 14px;
  border: none;
  border-radius: var(--radius-btn);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  color: var(--accent);
  background: transparent;
  transition: background 0.2s ease;
}

.modal-back:hover { background: var(--blue-bg); }

.modal-title {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.modal-close {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  color: var(--text-secondary);
  background: transparent;
  transition: background 0.2s ease, color 0.2s ease;
}

.modal-close:hover {
  background: rgba(0,0,0,0.06);
  color: var(--text);
}

.modal-iframe {
  flex: 1;
  border: none;
  width: 100%;
  background: #fff;
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: #fff;
  padding: 12px 24px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 500;
  z-index: 2000;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s ease;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== Footer ===== */
.footer {
  text-align: center;
  padding: 32px 24px 48px;
  color: var(--text-secondary);
  font-size: 13px;
  line-height: 1.8;
}

.footer a {
  color: var(--accent);
  text-decoration: none;
}

.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- Hero -->
<section class="hero">
  <h1 class="hero-title">采矿专业英语</h1>
  <p class="hero-subtitle">Mining English &mdash; A Comprehensive Course</p>
  <p class="hero-desc">21个单元系统学习采矿专业英语词汇、阅读与会话</p>
  <div class="hero-stats">
    <span class="stat"><strong>21</strong> Units</span>
    <span class="stat"><span class="dot dot-blue"></span> 地质基础</span>
    <span class="stat"><span class="dot dot-green"></span> 地下开采</span>
    <span class="stat"><span class="dot dot-orange"></span> 露天开采</span>
  </div>
</section>

<!-- Grid -->
<section class="grid-section">
  <div class="grid" id="unitGrid"></div>
</section>

<!-- Footer -->
<footer class="footer">
  Mining English Course &middot; 采矿专业英语<br>
  Built with edge-tts &middot; Azure Neural TTS
</footer>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay"></div>
<div class="modal-container" id="modalContainer">
  <div class="modal-toolbar">
    <button class="modal-back" onclick="closeModal()">&#8592; 返回</button>
    <span class="modal-title" id="modalTitle"></span>
    <button class="modal-close" onclick="closeModal()">&#10005;</button>
  </div>
  <iframe class="modal-iframe" id="modalIframe" allow="autoplay"></iframe>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const units = [
  { num: 1,  en: "Geological Terminology",              cn: "地质术语",               module: "geo" },
  { num: 2,  en: "Mining Terminology",                  cn: "采矿术语",               module: "geo" },
  { num: 3,  en: "Underground Mine Development",        cn: "地下矿山开拓",           module: "geo" },
  { num: 4,  en: "Factors Which Require A Shaft",       cn: "竖井开拓所具备的条件",   module: "geo" },
  { num: 5,  en: "Location of Access Relative to Orebodies", cn: "主井位置选择",       module: "geo" },
  { num: 6,  en: "Mine Development of Large Metalliferous Orebodies", cn: "大型金属矿床的地下开拓", module: "underground" },
  { num: 7,  en: "Underground Metalliferous Mining",    cn: "金属矿床地下开采",       module: "underground" },
  { num: 8,  en: "Room and Pillar Mining",              cn: "房柱法",                 module: "underground" },
  { num: 9,  en: "Stope and Pillar Mining",             cn: "全面采矿法",             module: "underground" },
  { num: 10, en: "Shrinkage Stopping",                  cn: "留矿采矿法",             module: "underground" },
  { num: 11, en: "Sublevel Stopping",                   cn: "分段矿房法",             module: "underground" },
  { num: 12, en: "Supported Methods",                   cn: "充填法",                 module: "underground" },
  { num: 13, en: "Caving Methods",                      cn: "崩落法",                 module: "underground" },
  { num: 14, en: "Mine Ventilation",                    cn: "矿井通风",               module: "underground" },
  { num: 15, en: "The History of Surface Mining",       cn: "露天开采发展历史",       module: "surface" },
  { num: 16, en: "Planning and Design of Surface Mines", cn: "露天开采计划与设计",   module: "surface" },
  { num: 17, en: "Ultimate Pit Definition",             cn: "最终开采境界的确定",     module: "surface" },
  { num: 18, en: "Open Pit Optimization",              cn: "露天坑境界优化",         module: "surface" },
  { num: 19, en: "Materials Handling and Waste Disposal", cn: "矿岩运输工艺与排岩工艺", module: "surface" },
  { num: 20, en: "Drilling",                           cn: "凿岩",                   module: "surface" },
  { num: 21, en: "Blasting",                           cn: "爆破",                   module: "surface" }
];

const moduleLabels = {
  geo:         { text: "地质基础", cls: "module-geo" },
  underground: { text: "地下开采", cls: "module-underground" },
  surface:     { text: "露天开采", cls: "module-surface" }
};

// Unit content definitions — add links here as units are completed
const unitContent = {
  1: [
    { icon: "📖", label: "词汇表",       file: "Unit1/Unit1_词汇表.html",     title: "词汇表 Vocabulary" },
    { icon: "📝", label: "精读材料",     file: "Unit1/Unit1_精读材料.html",   title: "精读材料 Intensive Reading" },
    { icon: "💬", label: "情境会话",     file: "Unit1/Unit1_情境会话.html",   title: "情境会话 Situational Dialogue" },
    { icon: "📋", label: "句型汇总",     file: "Unit1/Unit1_句型汇总.html",   title: "句型汇总 Sentence Patterns" }
  ],
  2: [
    { icon: "📖", label: "词汇表",       file: "Unit2/Unit2_词汇表.html",     title: "词汇表 Vocabulary" },
    { icon: "📝", label: "精读材料",     file: "Unit2/Unit2_精读材料.html",   title: "精读材料 Intensive Reading" },
    { icon: "💬", label: "情境会话",     file: "Unit2/Unit2_情境会话.html",   title: "情境会话 Situational Dialogue" },
    { icon: "📋", label: "句型汇总",     file: "Unit2/Unit2_句型汇总.html",   title: "句型汇总 Sentence Patterns" }
  ]
};

const grid = document.getElementById("unitGrid");

units.forEach(u => {
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.unit = u.num;

  const numStr = String(u.num).padStart(2, "0");
  const ml = moduleLabels[u.module];
  const isDone = unitContent[u.num] != null;
  const links = unitContent[u.num] || [];

  let linksHTML = "";
  if (isDone) {
    linksHTML = '<div class="card-links">' +
      links.map(l =>
        `<a class="card-link" onclick="openModal('${l.file}', '${l.title}')">` +
        `<span class="link-icon">${l.icon}</span>${l.label}</a>`
      ).join("") +
      "</div>";
  }

  card.innerHTML = `
    <div class="card-number">${numStr}</div>
    <div class="card-title-en">${u.en}</div>
    <div class="card-title-cn">${u.cn}</div>
    ${linksHTML}
    <div class="card-footer">
      <span class="card-module ${ml.cls}">${ml.text}</span>
      <span class="card-status ${isDone ? 'status-done' : 'status-pending'}">${isDone ? '已完成' : '待开发'}</span>
    </div>
  `;

  if (!isDone) {
    card.style.cursor = "pointer";
    card.addEventListener("click", () => showToast("Unit " + u.num + " 正在开发中，敬请期待"));
  }

  grid.appendChild(card);
});

function openModal(src, title) {
  event.stopPropagation();
  const overlay = document.getElementById("modalOverlay");
  const container = document.getElementById("modalContainer");
  const iframe = document.getElementById("modalIframe");
  const titleEl = document.getElementById("modalTitle");

  titleEl.textContent = title;
  iframe.src = src;

  overlay.classList.add("open");
  container.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  const overlay = document.getElementById("modalOverlay");
  const container = document.getElementById("modalContainer");
  const iframe = document.getElementById("modalIframe");

  container.classList.remove("open");
  overlay.classList.remove("open");
  document.body.style.overflow = "";

  setTimeout(() => { iframe.src = "about:blank"; }, 350);
}

document.getElementById("modalOverlay").addEventListener("click", closeModal);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.classList.remove("show"); }, 2200);
}
</script>
</body>
</html>
