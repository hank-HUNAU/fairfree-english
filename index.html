<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>采矿专业英语 - Mining English</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f5f7;
  --card-bg: #ffffff;
  --text: #1d1d1f;
  --text-secondary: #86868b;
  --accent: #0071e3;
  --accent-hover: #0077ed;
  --green: #34c759;
  --green-bg: rgba(52, 199, 89, 0.1);
  --blue: #0071e3;
  --blue-bg: rgba(0, 113, 227, 0.08);
  --orange: #ff9500;
  --orange-bg: rgba(255, 149, 0, 0.1);
  --gray: #86868b;
  --gray-bg: rgba(134, 134, 139, 0.08);
  --radius: 12px;
  --radius-btn: 8px;
  --shadow: 0 1px 6px rgba(0,0,0,0.05);
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'Noto Sans SC', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ===== Hero ===== */
.hero {
  max-width: 1000px;
  margin: 0 auto;
  padding: 60px 24px 40px;
  text-align: center;
}

.hero-title {
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 6px;
}

.hero-subtitle {
  font-size: clamp(14px, 2vw, 18px);
  font-weight: 400;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

.hero-stats .stat {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 14px;
  background: var(--card-bg);
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  box-shadow: var(--shadow);
}

.hero-stats .stat strong { color: var(--text); font-weight: 600; }
.hero-stats .stat .dot { width: 6px; height: 6px; border-radius: 50%; }
.dot-blue { background: var(--blue); }
.dot-green { background: var(--green); }
.dot-orange { background: var(--orange); }

/* ===== Table Section ===== */
.table-section {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 24px 60px;
}

.unit-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 8px;
}

.unit-table th {
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  text-align: left;
  background: transparent;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}

.unit-table th:nth-child(2) { text-align: center; }

.unit-table td {
  padding: 16px;
  background: var(--card-bg);
  vertical-align: middle;
}

.unit-table td:first-child { border-radius: var(--radius) 0 0 var(--radius); }
.unit-table td:last-child { border-radius: 0 var(--radius) var(--radius) 0; }

.unit-table tr:hover td { background: #fafafa; }

/* ===== Unit Name Column ===== */
.unit-name {
  display: flex;
  align-items: center;
  gap: 16px;
}

.unit-num {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  opacity: 0.3;
  line-height: 1;
  min-width: 36px;
}

.unit-info { flex: 1; }

.unit-title-en {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
  line-height: 1.3;
}

.unit-title-cn {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.3;
}

.unit-module {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 100px;
  margin-top: 6px;
}

.module-geo { background: var(--blue-bg); color: var(--blue); }
.module-underground { background: var(--green-bg); color: #248a3d; }
.module-surface { background: var(--orange-bg); color: #c77600; }

/* ===== Links Column ===== */
.unit-links {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.link-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 8px 14px;
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: var(--radius-btn);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  background: var(--blue-bg);
  cursor: pointer;
  transition: all 0.15s ease;
  text-decoration: none;
  white-space: nowrap;
}

.link-btn:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.link-btn:active { transform: scale(0.97); }

.link-btn .icon { font-size: 16px; line-height: 1; }

.link-btn.disabled {
  color: var(--gray);
  background: var(--gray-bg);
  border-color: transparent;
  cursor: default;
  pointer-events: none;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .unit-table th { display: none; }
  .unit-table, .unit-table tbody, .unit-table tr, .unit-table td { display: block; width: 100%; }
  .unit-table tr { margin-bottom: 12px; background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); }
  .unit-table td { padding: 14px 16px; border-radius: 0 !important; }
  .unit-table td:first-child { border-radius: var(--radius) var(--radius) 0 0 !important; }
  .unit-table td:last-child { border-radius: 0 0 var(--radius) var(--radius) !important; border-top: 1px solid rgba(0,0,0,0.04); }
  .unit-name { flex-direction: column; align-items: flex-start; gap: 8px; }
  .unit-num { font-size: 22px; }
  .unit-links { justify-content: flex-start; }
}

@media (max-width: 480px) {
  .hero { padding: 40px 16px 24px; }
  .table-section { padding: 0 16px 40px; }
  .link-btn { padding: 6px 10px; font-size: 12px; gap: 3px; }
  .link-btn .icon { font-size: 14px; }
}

/* ===== Modal ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(8px);
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s ease, visibility 0.3s ease;
}

.modal-overlay.open { opacity: 1; visibility: visible; }

.modal-container {
  position: fixed;
  inset: 0;
  z-index: 1001;
  background: var(--card-bg);
  display: flex;
  flex-direction: column;
  transform: translateY(20px);
  opacity: 0;
  visibility: hidden;
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.3s ease, visibility 0.3s ease;
}

.modal-container.open { transform: translateY(0); opacity: 1; visibility: visible; }

.modal-toolbar {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  background: var(--card-bg);
  border-bottom: 1px solid rgba(0,0,0,0.06);
  flex-shrink: 0;
  gap: 12px;
}

.modal-back {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 14px;
  border: none;
  border-radius: var(--radius-btn);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  color: var(--accent);
  background: transparent;
  transition: background 0.2s ease;
}

.modal-back:hover { background: var(--blue-bg); }

.modal-title {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.modal-close {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  color: var(--text-secondary);
  background: transparent;
  transition: background 0.2s ease;
}

.modal-close:hover { background: rgba(0,0,0,0.06); }

.modal-iframe { flex: 1; border: none; width: 100%; background: #fff; }

/* ===== Footer ===== */
.footer {
  text-align: center;
  padding: 24px;
  color: var(--text-secondary);
  font-size: 12px;
}
</style>
</head>
<body>

<!-- Hero -->
<section class="hero">
  <h1 class="hero-title">采矿专业英语</h1>
  <p class="hero-subtitle">Mining English — A Comprehensive Course</p>
  <div class="hero-stats">
    <span class="stat"><strong>21</strong> Units</span>
    <span class="stat"><span class="dot dot-blue"></span> 地质基础</span>
    <span class="stat"><span class="dot dot-green"></span> 地下开采</span>
    <span class="stat"><span class="dot dot-orange"></span> 露天开采</span>
    <a class="stat checkin-link" href="checkin.html" style="background:var(--accent);color:#fff;cursor:pointer;">📅 学习打卡</a>
  </div>
</section>

<!-- Table -->
<section class="table-section">
  <table class="unit-table">
    <thead>
      <tr>
        <th>单元名称</th>
        <th>学习内容</th>
      </tr>
    </thead>
    <tbody id="unitBody"></tbody>
  </table>
</section>

<!-- Footer -->
<footer class="footer">Mining English Course · 采矿专业英语 · Built with edge-tts</footer>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay"></div>
<div class="modal-container" id="modalContainer">
  <div class="modal-toolbar">
    <button class="modal-back" onclick="closeModal()">← 返回</button>
    <span class="modal-title" id="modalTitle"></span>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <iframe class="modal-iframe" id="modalIframe" allow="autoplay"></iframe>
</div>

<script>
const units = [
  { num: 1,  en: "Geological Terminology",              cn: "地质术语",               module: "geo" },
  { num: 2,  en: "Mining Terminology",                  cn: "采矿术语",               module: "geo" },
  { num: 3,  en: "Underground Mine Development",        cn: "地下矿山开拓",           module: "geo" },
  { num: 4,  en: "Factors Which Require A Shaft",       cn: "竖井开拓所具备的条件",   module: "geo" },
  { num: 5,  en: "Location of Access Relative to Orebodies", cn: "主井位置选择",       module: "geo" },
  { num: 6,  en: "Mine Development of Large Metalliferous Orebodies", cn: "大型金属矿床的地下开拓", module: "underground" },
  { num: 7,  en: "Underground Metalliferous Mining",    cn: "金属矿床地下开采",       module: "underground" },
  { num: 8,  en: "Room and Pillar Mining",              cn: "房柱法",                 module: "underground" },
  { num: 9,  en: "Stope and Pillar Mining",             cn: "全面采矿法",             module: "underground" },
  { num: 10, en: "Shrinkage Stopping",                  cn: "留矿采矿法",             module: "underground" },
  { num: 11, en: "Sublevel Stopping",                   cn: "分段矿房法",             module: "underground" },
  { num: 12, en: "Supported Methods",                   cn: "充填法",                 module: "underground" },
  { num: 13, en: "Caving Methods",                      cn: "崩落法",                 module: "underground" },
  { num: 14, en: "Mine Ventilation",                    cn: "矿井通风",               module: "underground" },
  { num: 15, en: "The History of Surface Mining",       cn: "露天开采发展历史",       module: "surface" },
  { num: 16, en: "Planning and Design of Surface Mines", cn: "露天开采计划与设计",   module: "surface" },
  { num: 17, en: "Ultimate Pit Definition",             cn: "最终开采境界的确定",     module: "surface" },
  { num: 18, en: "Open Pit Optimization",              cn: "露天坑境界优化",         module: "surface" },
  { num: 19, en: "Materials Handling and Waste Disposal", cn: "矿岩运输工艺与排岩工艺", module: "surface" },
  { num: 20, en: "Drilling",                           cn: "凿岩",                   module: "surface" },
  { num: 21, en: "Blasting",                           cn: "爆破",                   module: "surface" }
];

const moduleLabels = {
  geo:         { text: "地质基础", cls: "module-geo" },
  underground: { text: "地下开采", cls: "module-underground" },
  surface:     { text: "露天开采", cls: "module-surface" }
};

// 学习内容定义
const links = [
  { icon: "📖", label: "词汇学习", file: "词汇表.html",     title: "词汇学习 Vocabulary" },
  { icon: "📋", label: "句型学习", file: "句型汇总.html",   title: "句型学习 Sentence Patterns" },
  { icon: "💬", label: "情境会话", file: "情境会话.html",   title: "情境会话 Situational Dialogue" },
  { icon: "📝", label: "专题阅读", file: "精读材料.html",   title: "专题阅读 Intensive Reading" }
];

// 已完成的单元
const completedUnits = [1, 2];

const tbody = document.getElementById("unitBody");

units.forEach(u => {
  const tr = document.createElement("tr");
  const numStr = String(u.num).padStart(2, "0");
  const ml = moduleLabels[u.module];
  const isDone = completedUnits.includes(u.num);

  // 单元名称列
  const td1 = document.createElement("td");
  td1.innerHTML = `
    <div class="unit-name">
      <span class="unit-num">${numStr}</span>
      <div class="unit-info">
        <div class="unit-title-en">${u.en}</div>
        <div class="unit-title-cn">${u.cn}</div>
        <span class="unit-module ${ml.cls}">${ml.text}</span>
      </div>
    </div>
  `;

  // 学习内容列
  const td2 = document.createElement("td");
  const linksDiv = document.createElement("div");
  linksDiv.className = "unit-links";

  links.forEach(l => {
    const btn = document.createElement("a");
    btn.className = "link-btn" + (isDone ? "" : " disabled");
    btn.innerHTML = `<span class="icon">${l.icon}</span>${l.label}`;
    if (isDone) {
      const file = `Unit${u.num}/Unit${u.num}_${l.file}`;
      btn.onclick = (e) => { e.preventDefault(); openModal(file, l.title); };
    }
    linksDiv.appendChild(btn);
  });

  td2.appendChild(linksDiv);
  tr.appendChild(td1);
  tr.appendChild(td2);
  tbody.appendChild(tr);
});

function openModal(src, title) {
  const overlay = document.getElementById("modalOverlay");
  const container = document.getElementById("modalContainer");
  const iframe = document.getElementById("modalIframe");
  document.getElementById("modalTitle").textContent = title;
  iframe.src = src;
  overlay.classList.add("open");
  container.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.getElementById("modalContainer").classList.remove("open");
  document.body.style.overflow = "";
  setTimeout(() => { document.getElementById("modalIframe").src = "about:blank"; }, 350);
}

document.getElementById("modalOverlay").addEventListener("click", closeModal);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
</script>
</body>
</html>
