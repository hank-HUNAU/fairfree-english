<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞优英语 - Fair Free English</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f8f6f3;
  --bg-dark: #1a1a1a;
  --text: #2d2d2d;
  --text-light: #f8f6f3;
  --accent: #c9a227;
  --accent-dark: #8b7355;
  --book-spine: #8b4513;
  --book-cover: #d4a574;
  --book-inner: #f5e6d3;
  --shadow: rgba(0,0,0,0.15);
  --shadow-deep: rgba(0,0,0,0.3);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Serif SC', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background-image: 
    radial-gradient(circle at 20% 80%, rgba(201, 162, 39, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(139, 69, 19, 0.08) 0%, transparent 50%);
}

/* ===== Header ===== */
.header {
  text-align: center;
  margin-bottom: 60px;
  animation: fadeInDown 0.8s ease;
}

.header-brand {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 6vw, 56px);
  font-weight: 700;
  color: var(--book-spine);
  letter-spacing: 0.02em;
  margin-bottom: 8px;
}

.header-brand-cn {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(18px, 3vw, 24px);
  font-weight: 600;
  color: var(--accent-dark);
  letter-spacing: 0.1em;
}

.header-tagline {
  font-size: 14px;
  color: var(--text);
  opacity: 0.6;
  margin-top: 16px;
  font-style: italic;
}

/* ===== Bookshelf ===== */
.bookshelf {
  display: flex;
  gap: 40px;
  justify-content: center;
  flex-wrap: wrap;
  max-width: 900px;
  animation: fadeInUp 1s ease 0.3s both;
}

/* ===== Book Card ===== */
.book {
  position: relative;
  width: 220px;
  height: 300px;
  cursor: pointer;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  perspective: 1000px;
}

.book:hover {
  transform: translateY(-10px) rotateY(-5deg);
}

.book:hover .book-cover {
  transform: rotateY(-25deg);
}

.book:hover .book-spine {
  box-shadow: 4px 4px 20px var(--shadow-deep);
}

/* Book Spine */
.book-spine {
  position: absolute;
  left: 0;
  top: 0;
  width: 30px;
  height: 100%;
  background: linear-gradient(135deg, var(--book-spine) 0%, #6b3a0f 100%);
  border-radius: 3px 0 0 3px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 5px;
  box-shadow: 2px 2px 10px var(--shadow);
  z-index: 2;
}

.book-spine-text {
  font-size: 11px;
  font-weight: 600;
  color: var(--book-inner);
  writing-mode: vertical-rl;
  text-orientation: mixed;
  letter-spacing: 0.05em;
  text-align: center;
}

.book-spine-lines {
  position: absolute;
  top: 10px;
  bottom: 10px;
  left: 5px;
  right: 5px;
  border: 1px solid rgba(245, 230, 211, 0.3);
  border-radius: 2px;
}

/* Book Cover */
.book-cover {
  position: absolute;
  left: 30px;
  top: 0;
  width: 190px;
  height: 100%;
  background: linear-gradient(145deg, var(--book-cover) 0%, #c49a6c 100%);
  border-radius: 0 3px 3px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  box-shadow: 3px 3px 15px var(--shadow);
  transform-origin: left center;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 1;
  overflow: hidden;
}

.book-cover::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 8px;
  background: linear-gradient(90deg, var(--book-spine), var(--accent));
}

.book-cover::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 8px;
  background: linear-gradient(90deg, var(--book-spine), var(--accent));
}

/* Book Icon */
.book-icon {
  font-size: 48px;
  margin-bottom: 20px;
  filter: drop-shadow(2px 2px 4px var(--shadow));
}

/* Book Title */
.book-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px;
  font-weight: 700;
  color: #ffffff;
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: 0.05em;
}

.book-subtitle {
  font-size: 13px;
  color: #ffffff;
  opacity: 0.85;
  text-align: center;
  font-style: italic;
}

/* Book Inner Pages Effect */
.book-pages {
  position: absolute;
  left: 28px;
  top: 5px;
  width: 8px;
  height: calc(100% - 10px);
  background: repeating-linear-gradient(
    180deg,
    var(--book-inner) 0px,
    var(--book-inner) 2px,
    #e8d9c6 2px,
    #e8d9c6 4px
  );
  border-radius: 0 2px 2px 0;
  z-index: 0;
}

/* Book Link */
.book-link {
  position: absolute;
  inset: 0;
  z-index: 10;
}

/* ===== Book Variations ===== */
.book-1 .book-cover {
  background: linear-gradient(145deg, #d4a574 0%, #b8956a 100%);
}

.book-2 .book-cover {
  background: linear-gradient(145deg, #7a9e7e 0%, #5a7e5e 100%);
}

.book-2 .book-spine {
  background: linear-gradient(135deg, #4a6e4a 0%, #3a5a3a 100%);
}

.book-3 .book-cover {
  background: linear-gradient(145deg, #8b7355 0%, #6b5335 100%);
}

.book-3 .book-spine {
  background: linear-gradient(135deg, #5b4335 0%, #4b3325 100%);
}

/* ===== Footer ===== */
.footer {
  margin-top: 60px;
  text-align: center;
  font-size: 13px;
  color: var(--text);
  opacity: 0.5;
  animation: fadeIn 1s ease 0.6s both;
}

/* ===== Animations ===== */
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .bookshelf {
    gap: 30px;
  }
  
  .book {
    width: 180px;
    height: 260px;
  }
  
  .book-cover {
    width: 150px;
    left: 30px;
  }
  
  .book-icon {
    font-size: 36px;
  }
  
  .book-title {
    font-size: 16px;
  }
}

@media (max-width: 480px) {
  .bookshelf {
    flex-direction: column;
    align-items: center;
  }
  
  .header {
    margin-bottom: 40px;
  }
}
</style>
</head>
<body>
