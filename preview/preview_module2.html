<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>课前预习 - Module 2 词汇</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #4257b2;
  --primary-light: #5c75d6;
  --primary-dark: #2d4199;
  --success: #2ecc71;
  --danger: #e74c3c;
  --warning: #f39c12;
  --bg: #f5f7fa;
  --card-bg: #fff;
  --text: #2c3e50;
  --text-muted: #7f8c8d;
  --border: #e0e6ed;
  --shadow: 0 4px 12px rgba(0,0,0,0.1);
  --radius: 12px;
}

html {
  height: 100dvh;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Noto Sans SC', 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: none;
}

/* ===== 顶部导航 ===== */
.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 56px;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  padding-top: env(safe-area-inset-top, 0);
  z-index: 100;
  box-shadow: var(--shadow);
}

.nav-back {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--primary);
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
}

.nav-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

.nav-progress {
  font-size: 13px;
  color: var(--text-muted);
}

/* ===== 进度条 ===== */
.progress-bar {
  position: fixed;
  top: 56px;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--border);
  z-index: 99;
}

.progress-fill {
  height: 100%;
  background: var(--primary);
  transition: width 0.3s ease;
}

/* ===== 主内容区 ===== */
.container {
  padding: calc(56px + 4px + env(safe-area-inset-top, 10px)) 16px 80px;
  max-width: 600px;
  margin: 0 auto;
}

/* ===== 阶段指示 ===== */
.phase-indicator {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 24px;
}

.phase-dot {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--border);
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}

.phase-dot.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 2px 8px rgba(66,87,178,0.3);
}

.phase-dot.completed {
  background: var(--success);
  color: #fff;
}

/* ===== Quizlet风格卡片 ===== */
.card-container {
  perspective: 1000px;
  margin-bottom: 24px;
}

.vocab-card {
  position: relative;
  width: 100%;
  min-height: 280px;
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
}

.vocab-card.flipped {
  transform: rotateY(180deg);
}

.card-front, .card-back {
  position: absolute;
  inset: 0;
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  backface-visibility: hidden;
  border-radius: var(--radius);
}

.card-back {
  transform: rotateY(180deg);
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: #fff;
}

/* 卡片正面内容 */
.card-word {
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 16px;
  text-align: center;
}

.card-syllables {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
}

.syllable {
  padding: 8px 12px;
  background: var(--bg);
  border-radius: 6px;
  font-size: 18px;
  font-weight: 500;
  color: var(--primary);
  cursor: pointer;
  transition: all 0.2s;
}

.syllable:hover {
  background: var(--primary);
  color: #fff;
}

.syllable.highlight {
  background: var(--warning);
  color: #fff;
  animation: pulse 0.5s ease;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.card-phonetic {
  font-size: 16px;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.card-play-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  margin-top: 16px;
}

.card-play-btn:hover {
  background: var(--primary-dark);
  transform: scale(1.05);
}

.card-play-btn svg {
  width: 24px;
  height: 24px;
  fill: currentColor;
}

/* 卡片背面内容 */
.card-meaning {
  font-size: 24px;
  font-weight: 600;
  text-align: center;
  margin-bottom: 16px;
}

.card-example {
  font-size: 14px;
  opacity: 0.9;
  text-align: center;
  line-height: 1.6;
}

.flip-hint {
  position: absolute;
  bottom: 16px;
  font-size: 12px;
  color: var(--text-muted);
  opacity: 0.6;
}

/* ===== 第一轮：认识筛选 ===== */
.round1-buttons {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-top: 24px;
}

.know-btn, .unknown-btn {
  padding: 16px 32px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  min-width: 120px;
}

.know-btn {
  background: var(--success);
  color: #fff;
}

.know-btn:hover {
  background: #27ae60;
  transform: translateY(-2px);
}

.unknown-btn {
  background: var(--danger);
  color: #fff;
}

.unknown-btn:hover {
  background: #c0392b;
  transform: translateY(-2px);
}

/* ===== 第二轮：深度学习 ===== */
.round2-info {
  text-align: center;
  margin-bottom: 24px;
  padding: 16px;
  background: var(--bg);
  border-radius: 8px;
}

.round2-info h3 {
  font-size: 14px;
  color: var(--primary);
  margin-bottom: 8px;
}

.round2-info p {
  font-size: 13px;
  color: var(--text-muted);
}

.syllable-play-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 20px;
}

.syllable-play-btn {
  padding: 12px 20px;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
}

.syllable-play-btn:hover {
  border-color: var(--primary);
  background: var(--primary);
  color: #fff;
}

.syllable-play-btn.playing {
  background: var(--warning);
  border-color: var(--warning);
  color: #fff;
}

/* ===== 第三轮：测试 ===== */
.test-section {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
}

.test-header {
  text-align: center;
  margin-bottom: 24px;
}

.test-header h2 {
  font-size: 18px;
  color: var(--primary);
  margin-bottom: 8px;
}

.test-header p {
  font-size: 14px;
  color: var(--text-muted);
}

.test-question {
  margin-bottom: 24px;
}

.test-question-text {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 16px;
}

.test-input {
  width: 100%;
  padding: 16px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 16px;
  transition: border-color 0.2s;
}

.test-input:focus {
  outline: none;
  border-color: var(--primary);
}

.test-input.correct {
  border-color: var(--success);
  background: rgba(46,204,113,0.1);
}

.test-input.wrong {
  border-color: var(--danger);
  background: rgba(231,76,60,0.1);
}

/* 匹配测试 */
.match-container {
  display: flex;
  gap: 24px;
  justify-content: space-between;
}

.match-column {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.match-item {
  padding: 16px;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.match-item:hover {
  border-color: var(--primary);
}

.match-item.selected {
  border-color: var(--primary);
  background: rgba(66,87,178,0.1);
}

.match-item.matched {
  border-color: var(--success);
  background: rgba(46,204,113,0.1);
  cursor: default;
}

/* ===== 结果页面 ===== */
.result-section {
  text-align: center;
  padding: 48px 24px;
}

.result-score {
  font-size: 48px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 16px;
}

.result-message {
  font-size: 18px;
  color: var(--text);
  margin-bottom: 32px;
}

.result-actions {
  display: flex;
  gap: 16px;
  justify-content: center;
}

.result-btn {
  padding: 16px 32px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.result-btn.primary {
  background: var(--primary);
  color: #fff;
}

.result-btn.secondary {
  background: var(--bg);
  color: var(--text);
  border: 2px solid var(--border);
}

/* ===== 底部操作栏 ===== */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 64px;
  background: var(--card-bg);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 0 16px;
  padding-bottom: env(safe-area-inset-bottom, 0);
  z-index: 100;
}

.bottom-btn {
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.bottom-btn.primary {
  background: var(--primary);
  color: #fff;
}

.bottom-btn.secondary {
  background: var(--bg);
  color: var(--text);
}

/* ===== 隐藏状态 ===== */
.hidden { display: none !important; }

/* ===== 手机适配 ===== */
@media (max-width: 480px) {
  .container { padding: calc(56px + 4px + 10px) 12px 80px; }
  
  .card-word { font-size: 28px; }
  .syllable { padding: 6px 10px; font-size: 16px; }
  .card-meaning { font-size: 20px; }
  
  .know-btn, .unknown-btn { padding: 14px 24px; font-size: 14px; min-width: 100px; }
  
  .match-container { flex-direction: column; gap: 16px; }
  
  .bottom-bar { height: 56px; gap: 12px; }
  .bottom-btn { padding: 10px 20px; font-size: 13px; }
}

@media (max-width: 360px) {
  .card-word { font-size: 24px; }
  .syllable { padding: 4px 8px; font-size: 14px; }
  .phase-dot { width: 32px; height: 32px; font-size: 12px; }
}
</style>
</head>
<body>

<!-- 顶部导航 -->
<nav class="top-nav">
  <a class="nav-back" href="mycourse.html">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    返回
  </a>
  <span class="nav-title">课前预习</span>
  <span class="nav-progress" id="navProgress">0/69</span>
</nav>

<!-- 进度条 -->
<div class="progress-bar">
  <div class="progress-fill" id="progressFill" style="width: 0%"></div>
</div>

<!-- 主内容 -->
<main class="container">

  <!-- 阶段指示 -->
  <div class="phase-indicator">
    <div class="phase-dot active" data-phase="1">1</div>
    <div class="phase-dot" data-phase="2">2</div>
    <div class="phase-dot" data-phase="3">3</div>
  </div>

  <!-- 第一轮：认识筛选 -->
  <section id="round1" class="round-section">
    <div class="card-container">
      <div class="vocab-card" id="vocabCard" onclick="flipCard()">
        <div class="card-front">
          <div class="card-word" id="cardWord">regarding</div>
          <div class="card-syllables" id="cardSyllables">
            <span class="syllable">re</span>
            <span class="syllable">gard</span>
            <span class="syllable">ing</span>
          </div>
          <div class="card-phonetic" id="cardPhonetic">[rɪˈɡɑ:dɪŋ]</div>
          <button class="card-play-btn" onclick="playWord(event)">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <span class="flip-hint">点击卡片查看释义</span>
        </div>
        <div class="card-back">
          <div class="card-meaning" id="cardMeaning">关于</div>
          <div class="card-example" id="cardExample">关于这个问题，我们需要进一步讨论。</div>
        </div>
      </div>
    </div>
    
    <div class="round1-buttons">
      <button class="know-btn" onclick="markKnown()">认识 ✓</button>
      <button class="unknown-btn" onclick="markUnknown()">不认识 ✗</button>
    </div>
  </section>

  <!-- 第二轮：深度学习 -->
  <section id="round2" class="round-section hidden">
    <div class="round2-info">
      <h3>第二轮：深度学习</h3>
      <p>点击音节按钮，听发音并跟读。点击卡片查看释义。</p>
    </div>
    
    <div class="card-container">
      <div class="vocab-card" id="vocabCard2" onclick="flipCard2()">
        <div class="card-front">
          <div class="card-word" id="cardWord2">regarding</div>
          <div class="card-phonetic" id="cardPhonetic2">[rɪˈɡɑ:dɪŋ]</div>
          <button class="card-play-btn" onclick="playWord2(event)">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </button>
        </div>
        <div class="card-back">
          <div class="card-meaning" id="cardMeaning2">关于</div>
        </div>
      </div>
    </div>
    
    <div class="syllable-play-controls" id="syllableControls">
      <!-- 音节按钮动态生成 -->
    </div>
  </section>

  <!-- 第三轮：测试 -->
  <section id="round3" class="round-section hidden">
    <div class="test-section">
      <div class="test-header">
        <h2 id="testTitle">拼写测试</h2>
        <p id="testSubtitle">听音频，输入正确的拼写</p>
      </div>
      
      <!-- 拼写测试 -->
      <div id="spellingTest" class="test-question">
        <div class="test-question-text" id="spellingQuestion">请输入单词拼写：</div>
        <button class="card-play-btn" onclick="playTestWord()" style="margin-bottom:16px">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <input type="text" class="test-input" id="spellingInput" placeholder="输入拼写..." onkeyup="checkSpelling()">
      </div>
      
      <!-- 匹配测试 -->
      <div id="matchTest" class="hidden">
        <div class="match-container">
          <div class="match-column" id="matchEnglish">
            <!-- 英文选项 -->
          </div>
          <div class="match-column" id="matchChinese">
            <!-- 中文选项 -->
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- 结果页面 -->
  <section id="resultSection" class="round-section hidden">
    <div class="result-section">
      <div class="result-score" id="resultScore">85%</div>
      <div class="result-message" id="resultMessage">太棒了！预习完成！</div>
      <div class="result-actions">
        <button class="result-btn primary" onclick="saveProgress()">保存进度</button>
        <button class="result-btn secondary" onclick="restartPreview()">重新预习</button>
      </div>
    </div>
  </section>

</main>

<!-- 底部操作栏 -->
<div class="bottom-bar">
  <button class="bottom-btn secondary" onclick="skipWord()">跳过</button>
  <button class="bottom-btn primary" id="nextBtn" onclick="nextWord()">下一个</button>
</div>

<script>
// ===== 词汇数据 =====
const vocabData = [
  {"word":"regarding","phonetic":"[rɪˈɡɑ:dɪŋ]","meaning":"关于","syllables":["re","gard","ing"]},
  {"word":"concerning","phonetic":"[kənˈsɜ:nɪŋ]","meaning":"关于","syllables":["con","cern","ing"]},
  {"word":"investigation","phonetic":"[ɪnˈvestɪˈɡeɪʃən]","meaning":"调查","syllables":["in","ves","ti","ga","tion"]},
  {"word":"properly","phonetic":"[ˈprɒpəlɪ]","meaning":"正常地","syllables":["prop","er","ly"]},
  {"word":"issue","phonetic":"[ˈɪʃu:]","meaning":"问题","syllables":["is","sue"]},
  {"word":"problem","phonetic":"[ˈprɒbləm]","meaning":"问题","syllables":["prob","lem"]},
  {"word":"status","phonetic":"[ˈsteɪtəs]","meaning":"状态","syllables":["sta","tus"]},
  {"word":"delay","phonetic":"[dɪˈleɪ]","meaning":"延迟","syllables":["de","lay"]},
  {"word":"target","phonetic":"[ˈtɑ:ɡɪt]","meaning":"目标","syllables":["tar","get"]},
  {"word":"track","phonetic":"[træk]","meaning":"轨道","syllables":["track"]}
];

// ===== 状态管理 =====
let currentIndex = 0;
let currentPhase = 1; // 1: 筛选, 2: 深度学习, 3: 测试
let knownWords = [];
let unknownWords = [];
let testResults = { correct: 0, wrong: 0 };

// ===== 第一轮：认识筛选 =====
function showRound1Word(index) {
  if (index >= vocabData.length) {
    startRound2();
    return;
  }
  
  const vocab = vocabData[index];
  document.getElementById('cardWord').textContent = vocab.word;
  document.getElementById('cardPhonetic').textContent = vocab.phonetic;
  document.getElementById('cardMeaning').textContent = vocab.meaning;
  
  // 生成音节
  const syllablesHtml = vocab.syllables.map(s => 
    `<span class="syllable" onclick="playSyllable('${s}', event)">${s}</span>`
  ).join('');
  document.getElementById('cardSyllables').innerHTML = syllablesHtml;
  
  // 重置卡片状态
  document.getElementById('vocabCard').classList.remove('flipped');
  
  updateProgress(index);
}

function markKnown() {
  knownWords.push(vocabData[currentIndex]);
  currentIndex++;
  showRound1Word(currentIndex);
}

function markUnknown() {
  unknownWords.push(vocabData[currentIndex]);
  currentIndex++;
  showRound1Word(currentIndex);
}

function flipCard() {
  document.getElementById('vocabCard').classList.toggle('flipped');
}

// ===== 第二轮：深度学习 =====
function startRound2() {
  currentPhase = 2;
  updatePhaseIndicator(2);
  
  document.getElementById('round1').classList.add('hidden');
  document.getElementById('round2').classList.remove('hidden');
  
  if (unknownWords.length === 0) {
    startRound3();
    return;
  }
  
  currentIndex = 0;
  showRound2Word(currentIndex);
}

function showRound2Word(index) {
  if (index >= unknownWords.length) {
    startRound3();
    return;
  }
  
  const vocab = unknownWords[index];
  document.getElementById('cardWord2').textContent = vocab.word;
  document.getElementById('cardPhonetic2').textContent = vocab.phonetic;
  document.getElementById('cardMeaning2').textContent = vocab.meaning;
  
  // 生成音节播放按钮
  const controlsHtml = vocab.syllables.map(s => 
    `<button class="syllable-play-btn" onclick="playSyllable2('${s}', this)">${s}</button>`
  ).join('');
  document.getElementById('syllableControls').innerHTML = controlsHtml;
  
  document.getElementById('vocabCard2').classList.remove('flipped');
  updateProgress(index);
}

function flipCard2() {
  document.getElementById('vocabCard2').classList.toggle('flipped');
}

// ===== 第三轮：测试 =====
function startRound3() {
  currentPhase = 3;
  updatePhaseIndicator(3);
  
  document.getElementById('round2').classList.add('hidden');
  document.getElementById('round3').classList.remove('hidden');
  
  currentIndex = 0;
  showSpellingTest(currentIndex);
}

function showSpellingTest(index) {
  if (index >= unknownWords.length) {
    showMatchTest();
    return;
  }
  
  const vocab = unknownWords[index];
  document.getElementById('spellingQuestion').textContent = `请输入单词拼写（提示：${vocab.meaning}）`;
  document.getElementById('spellingInput').value = '';
  document.getElementById('spellingInput').className = 'test-input';
  document.getElementById('spellingInput').dataset.word = vocab.word;
}

function checkSpelling() {
  const input = document.getElementById('spellingInput');
  const word = input.dataset.word;
  const value = input.value.toLowerCase().trim();
  
  if (value === word.toLowerCase()) {
    input.className = 'test-input correct';
    testResults.correct++;
    setTimeout(() => {
      currentIndex++;
      showSpellingTest(currentIndex);
    }, 500);
  }
}

function showMatchTest() {
  document.getElementById('spellingTest').classList.add('hidden');
  document.getElementById('matchTest').classList.remove('hidden');
  document.getElementById('testTitle').textContent = '匹配测试';
  document.getElementById('testSubtitle').textContent = '将英文与中文匹配';
  
  // 生成匹配选项
  const words = unknownWords.slice(0, 5);
  const shuffledWords = [...words].sort(() => Math.random() - 0.5);
  const shuffledMeanings = [...words].sort(() => Math.random() - 0.5);
  
  const englishHtml = shuffledWords.map(w => 
    `<div class="match-item" data-word="${w.word}" onclick="selectMatch(this, 'en')">${w.word}</div>`
  ).join('');
  
  const chineseHtml = shuffledMeanings.map(w => 
    `<div class="match-item" data-meaning="${w.meaning}" data-word="${w.word}" onclick="selectMatch(this, 'cn')">${w.meaning}</div>`
  ).join('');
  
  document.getElementById('matchEnglish').innerHTML = englishHtml;
  document.getElementById('matchChinese').innerHTML = chineseHtml;
}

let selectedEn = null;
let selectedCn = null;

function selectMatch(el, type) {
  if (el.classList.contains('matched')) return;
  
  if (type === 'en') {
    if (selectedEn) selectedEn.classList.remove('selected');
    selectedEn = el;
    el.classList.add('selected');
  } else {
    if (selectedCn) selectedCn.classList.remove('selected');
    selectedCn = el;
    el.classList.add('selected');
  }
  
  // 检查匹配
  if (selectedEn && selectedCn) {
    const enWord = selectedEn.dataset.word;
    const cnWord = selectedCn.dataset.word;
    
    if (enWord === cnWord) {
      selectedEn.classList.add('matched');
      selectedCn.classList.add('matched');
      selectedEn.classList.remove('selected');
      selectedCn.classList.remove('selected');
      testResults.correct++;
    } else {
      testResults.wrong++;
      selectedEn.classList.remove('selected');
      selectedCn.classList.remove('selected');
    }
    
    selectedEn = null;
    selectedCn = null;
    
    // 检查是否完成
    const matchedCount = document.querySelectorAll('.match-item.matched').length;
    if (matchedCount >= 10) {
      showResult();
    }
  }
}

// ===== 结果页面 =====
function showResult() {
  document.getElementById('round3').classList.add('hidden');
  document.getElementById('resultSection').classList.remove('hidden');
  document.querySelector('.bottom-bar').classList.add('hidden');
  
  const total = testResults.correct + testResults.wrong;
  const score = Math.round((testResults.correct / total) * 100);
  
  document.getElementById('resultScore').textContent = score + '%';
  
  if (score >= 80) {
    document.getElementById('resultMessage').textContent = '太棒了！预习完成！';
  } else if (score >= 60) {
    document.getElementById('resultMessage').textContent = '继续努力，再复习一下吧！';
  } else {
    document.getElementById('resultMessage').textContent = '建议重新预习不熟悉的词汇。';
  }
}

// ===== 辅助函数 =====
function updateProgress(index) {
  const total = currentPhase === 1 ? vocabData.length : unknownWords.length;
  const percent = Math.round((index / total) * 100);
  
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('navProgress').textContent = `${index}/${total}`;
}

function updatePhaseIndicator(phase) {
  document.querySelectorAll('.phase-dot').forEach(dot => {
    const p = parseInt(dot.dataset.phase);
    dot.classList.remove('active', 'completed');
    if (p < phase) dot.classList.add('completed');
    if (p === phase) dot.classList.add('active');
  });
}

function nextWord() {
  if (currentPhase === 1) {
    currentIndex++;
    showRound1Word(currentIndex);
  } else if (currentPhase === 2) {
    currentIndex++;
    showRound2Word(currentIndex);
  }
}

function skipWord() {
  nextWord();
}

// ===== 音频播放（模拟） =====
function playWord(e) {
  e.stopPropagation();
  // 实际项目中使用音频文件
  console.log('播放单词:', vocabData[currentIndex].word);
  // 模拟高亮效果
  document.querySelectorAll('.syllable').forEach(s => s.classList.add('highlight'));
  setTimeout(() => {
    document.querySelectorAll('.syllable').forEach(s => s.classList.remove('highlight'));
  }, 2000);
}

function playSyllable(syllable, e) {
  e.stopPropagation();
  console.log('播放音节:', syllable);
}

function playWord2(e) {
  e.stopPropagation();
  console.log('播放单词:', unknownWords[currentIndex].word);
}

function playSyllable2(syllable, btn) {
  btn.classList.add('playing');
  console.log('播放音节:', syllable);
  setTimeout(() => btn.classList.remove('playing'), 1000);
}

function playTestWord() {
  console.log('播放测试单词');
}

// ===== 进度保存 =====
function saveProgress() {
  // 保存到localStorage
  const progress = {
    module: 'Module2',
    date: new Date().toISOString(),
    knownCount: knownWords.length,
    unknownCount: unknownWords.length,
    score: document.getElementById('resultScore').textContent
  };
  
  localStorage.setItem('previewProgress', JSON.stringify(progress));
  
  // 同步到学习打卡系统
  if (window.studyTracker) {
    window.studyTracker.markComplete('preview', 'Module2');
  }
  
  alert('预习进度已保存！');
  window.location.href = 'mycourse.html';
}

function restartPreview() {
  currentIndex = 0;
  currentPhase = 1;
  knownWords = [];
  unknownWords = [];
  testResults = { correct: 0, wrong: 0 };
  
  document.getElementById('round1').classList.remove('hidden');
  document.getElementById('round2').classList.add('hidden');
  document.getElementById('round3').classList.add('hidden');
  document.getElementById('resultSection').classList.add('hidden');
  document.querySelector('.bottom-bar').classList.remove('hidden');
  
  updatePhaseIndicator(1);
  showRound1Word(0);
}

// ===== 初始化 =====
showRound1Word(0);
</script>
